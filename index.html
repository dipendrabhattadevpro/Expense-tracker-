<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker | Dipendra Bhatta</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #00ff88;
      --accent2: #ff4466;
      --accent3: #ffaa00;
      --accent4: #00aaff;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    .header-tag {
      font-size: 0.7rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Balance Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .card.balance::before { background: var(--accent4); }
    .card.income::before { background: var(--accent); }
    .card.expense::before { background: var(--accent2); }

    .card-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .card-amount {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .card.balance .card-amount { color: var(--accent4); }
    .card.income .card-amount { color: var(--accent); }
    .card.expense .card-amount { color: var(--accent2); }

    /* Main layout */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      animation: fadeUp 0.5s ease both;
    }

    .panel-title {
      font-family: var(--font-head);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    /* Type toggle */
    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .type-btn {
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .type-btn.active-income {
      background: rgba(0,255,136,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .type-btn.active-expense {
      background: rgba(255,68,102,0.1);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* Submit button */
    .btn-add {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-add:hover { background: #00cc6a; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* Transaction list */
    .transaction-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 0.3rem;
    }

    .transaction-list::-webkit-scrollbar { width: 4px; }
    .transaction-list::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
    .transaction-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .transaction-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      animation: fadeUp 0.3s ease both;
      transition: border-color 0.2s;
    }

    .transaction-item:hover { border-color: var(--muted); }

    .transaction-item.income-item { border-left: 3px solid var(--accent); }
    .transaction-item.expense-item { border-left: 3px solid var(--accent2); }

    .tx-left { display: flex; flex-direction: column; gap: 0.2rem; }

    .tx-name {
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .tx-meta {
      font-size: 0.65rem;
      color: var(--muted);
      display: flex;
      gap: 0.5rem;
    }

    .tx-cat {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }

    .tx-right { display: flex; align-items: center; gap: 0.8rem; }

    .tx-amount {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1rem;
    }

    .income-amount { color: var(--accent); }
    .expense-amount { color: var(--accent2); }

    .tx-delete {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .tx-delete:hover { background: rgba(255,68,102,0.15); border-color: var(--accent2); color: var(--accent2); }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 2rem;
      font-size: 0.8rem;
    }

    .empty-state .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* Chart section */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    @media (max-width: 700px) { .chart-grid { grid-template-columns: 1fr; } }

    .chart-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }

    .chart-container { position: relative; height: 220px; }

    /* Monthly report */
    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .month-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem;
    }

    .month-name {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .month-balance {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
    }

    .month-sub {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* Export button */
    .btn-export {
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 1px solid var(--accent3);
      color: var(--accent3);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-export:hover { background: rgba(255,170,0,0.1); }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-btn.active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .positive { color: var(--accent); }
    .negative { color: var(--accent2); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Expense<span>.</span>Tracker</div>
    <div class="header-tag">Built by Dipendra Bhatta</div>
  </header>

  <!-- Balance Cards -->
  <div class="cards">
    <div class="card balance">
      <div class="card-label">Total Balance</div>
      <div class="card-amount" id="balance">Rs. 0</div>
    </div>
    <div class="card income">
      <div class="card-label">Total Income</div>
      <div class="card-amount" id="total-income">Rs. 0</div>
    </div>
    <div class="card expense">
      <div class="card-label">Total Expenses</div>
      <div class="card-amount" id="total-expense">Rs. 0</div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">

    <!-- Add Transaction -->
    <div class="panel">
      <div class="panel-title">Add Transaction</div>

      <div class="type-toggle">
        <button class="type-btn active-income" id="btn-income" onclick="setType('income')">+ Income</button>
        <button class="type-btn" id="btn-expense" onclick="setType('expense')">− Expense</button>
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Freelance payment" />
      </div>

      <div class="form-group">
        <label>Amount (Rs.)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" />
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="Salary">💼 Salary</option>
          <option value="Freelance">💻 Freelance</option>
          <option value="Food">🍜 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Education">📚 Education</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">🏥 Health</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Savings">🏦 Savings</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="date" />
      </div>

      <button class="btn-add" onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- Transaction List -->
    <div class="panel">
      <div class="panel-title">Transactions</div>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
        <button class="filter-btn" onclick="setFilter('expense', this)">Expense</button>
      </div>

      <div class="transaction-list" id="transaction-list">
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <div>No transactions yet.<br>Add your first one!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-grid">
    <div class="chart-panel">
      <div class="panel-title">Spending by Category</div>
      <div class="chart-container">
        <canvas id="pie-chart"></canvas>
      </div>
    </div>
    <div class="chart-panel">
      <div class="panel-title">Income vs Expense</div>
      <div class="chart-container">
        <canvas id="bar-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- Monthly Report -->
  <div class="panel" style="margin-top: 1.5rem;">
    <div class="section-header">
      <div class="panel-title" style="margin:0">Monthly Report</div>
      <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="monthly-grid" id="monthly-grid">
      <div style="color:var(--muted); font-size:0.8rem;">No data yet.</div>
    </div>
  </div>

</div>

<script>
  // State
  let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
  let currentType = 'income';
  let currentFilter = 'all';
  let pieChart = null;
  let barChart = null;

  // Set today's date
  document.getElementById('date').valueAsDate = new Date();

  function setType(type) {
    currentType = type;
    document.getElementById('btn-income').className = 'type-btn' + (type === 'income' ? ' active-income' : '');
    document.getElementById('btn-expense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');

    // Update category options
    const cat = document.getElementById('category');
    const incomeOptions = ['Salary', 'Freelance', 'Savings', 'Other'];
    const expenseOptions = ['Food', 'Transport', 'Education', 'Shopping', 'Health', 'Entertainment', 'Other'];
    const allOptions = {
      Salary: '💼 Salary', Freelance: '💻 Freelance', Food: '🍜 Food',
      Transport: '🚌 Transport', Education: '📚 Education', Shopping: '🛍️ Shopping',
      Health: '🏥 Health', Entertainment: '🎮 Entertainment', Savings: '🏦 Savings', Other: '📦 Other'
    };

    const relevant = type === 'income' ? incomeOptions : expenseOptions;
    cat.innerHTML = relevant.map(k => `<option value="${k}">${allOptions[k]}</option>`).join('');
  }

  function addTransaction() {
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const date = document.getElementById('date').value;

    if (!desc) { alert('Please enter a description!'); return; }
    if (!amount || amount <= 0) { alert('Please enter a valid amount!'); return; }
    if (!date) { alert('Please select a date!'); return; }

    const transaction = {
      id: Date.now(),
      desc, amount, category, date,
      type: currentType
    };

    transactions.unshift(transaction);
    save();
    render();

    // Reset
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('date').valueAsDate = new Date();
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function save() {
    localStorage.setItem('transactions', JSON.stringify(transactions));
  }

  function formatAmount(n) {
    return 'Rs. ' + n.toLocaleString('en-NP', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function render() {
    renderSummary();
    renderList();
    renderCharts();
    renderMonthly();
  }

  function renderSummary() {
    const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('balance').textContent = formatAmount(balance);
    document.getElementById('total-income').textContent = formatAmount(income);
    document.getElementById('total-expense').textContent = formatAmount(expense);
  }

  function renderList() {
    const list = document.getElementById('transaction-list');
    const filtered = transactions.filter(t => currentFilter === 'all' || t.type === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div>No transactions yet.<br>Add your first one!</div></div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="transaction-item ${t.type}-item">
        <div class="tx-left">
          <div class="tx-name">${t.desc}</div>
          <div class="tx-meta">
            <span class="tx-cat">${t.category}</span>
            <span>${t.date}</span>
          </div>
        </div>
        <div class="tx-right">
          <div class="tx-amount ${t.type}-amount">
            ${t.type === 'income' ? '+' : '−'} ${formatAmount(t.amount)}
          </div>
          <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
        </div>
      </div>
    `).join('');
  }

  function renderCharts() {
    // Pie chart - expenses by category
    const expenses = transactions.filter(t => t.type === 'expense');
    const catTotals = {};
    expenses.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });

    const pieLabels = Object.keys(catTotals);
    const pieData = Object.values(catTotals);
    const colors = ['#00ff88','#ff4466','#ffaa00','#00aaff','#aa66ff','#ff8800','#00ffcc','#ff66aa','#88ff00','#66aaff'];

    if (pieChart) pieChart.destroy();
    const pieCtx = document.getElementById('pie-chart').getContext('2d');

    if (pieLabels.length === 0) {
      pieCtx.fillStyle = '#6b6b8a';
      pieCtx.font = '14px DM Mono';
      pieCtx.textAlign = 'center';
      pieCtx.fillText('No expense data', pieCtx.canvas.width / 2, pieCtx.canvas.height / 2);
    } else {
      pieChart = new Chart(pieCtx, {
        type: 'doughnut',
        data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: colors, borderColor: '#13131a', borderWidth: 3 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { color: '#e8e8f0', font: { family: 'DM Mono', size: 11 }, boxWidth: 12, padding: 10 } }
          }
        }
      });
    }

    // Bar chart - monthly income vs expense
    const monthlyData = {};
    transactions.forEach(t => {
      const month = t.date.substring(0, 7);
      if (!monthlyData[month]) monthlyData[month] = { income: 0, expense: 0 };
      monthlyData[month][t.type] += t.amount;
    });

    const months = Object.keys(monthlyData).sort().slice(-6);
    const monthLabels = months.map(m => { const [y, mo] = m.split('-'); return new Date(y, mo - 1).toLocaleString('default', { month: 'short' }) + ' ' + y.slice(2); });

    if (barChart) barChart.destroy();
    const barCtx = document.getElementById('bar-chart').getContext('2d');
    barChart = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: monthLabels.length ? monthLabels : ['No data'],
        datasets: [
          { label: 'Income', data: months.map(m => monthlyData[m].income), backgroundColor: 'rgba(0,255,136,0.7)', borderRadius: 6 },
          { label: 'Expense', data: months.map(m => monthlyData[m].expense), backgroundColor: 'rgba(255,68,102,0.7)', borderRadius: 6 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#e8e8f0', font: { family: 'DM Mono', size: 11 } } } },
        scales: {
          x: { ticks: { color: '#6b6b8a', font: { family: 'DM Mono' } }, grid: { color: '#2a2a3d' } },
          y: { ticks: { color: '#6b6b8a', font: { family: 'DM Mono' } }, grid: { color: '#2a2a3d' } }
        }
      }
    });
  }

  function renderMonthly() {
    const monthlyData = {};
    transactions.forEach(t => {
      const month = t.date.substring(0, 7);
      if (!monthlyData[month]) monthlyData[month] = { income: 0, expense: 0 };
      monthlyData[month][t.type] += t.amount;
    });

    const months = Object.keys(monthlyData).sort().reverse();
    const grid = document.getElementById('monthly-grid');

    if (months.length === 0) {
      grid.innerHTML = '<div style="color:var(--muted); font-size:0.8rem;">No data yet.</div>';
      return;
    }

    grid.innerHTML = months.map(m => {
      const d = monthlyData[m];
      const balance = d.income - d.expense;
      const [y, mo] = m.split('-');
      const label = new Date(y, mo - 1).toLocaleString('default', { month: 'long', year: 'numeric' });
      return `
        <div class="month-card">
          <div class="month-name">${label}</div>
          <div class="month-balance ${balance >= 0 ? 'positive' : 'negative'}">
            ${balance >= 0 ? '+' : ''}Rs. ${Math.abs(balance).toLocaleString()}
          </div>
          <div class="month-sub">In: Rs. ${d.income.toLocaleString()} | Out: Rs. ${d.expense.toLocaleString()}</div>
        </div>
      `;
    }).join('');
  }

  function exportCSV() {
    if (transactions.length === 0) { alert('No transactions to export!'); return; }
    const header = 'Date,Description,Category,Type,Amount\n';
    const rows = transactions.map(t => `${t.date},"${t.desc}",${t.category},${t.type},${t.amount}`).join('\n');
    const blob = new Blob([header + rows], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'expenses.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Init
  render();
</script>
</body>
</html>
